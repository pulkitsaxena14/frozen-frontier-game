<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0b1b33" />
  <title>Frozen Frontier</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/styles/main.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9D%84%EF%B8%8F%3C/text%3E%3C/svg%3E" />
</head>
<body>
  <div id="app">
    <canvas id="game-canvas"></canvas>

    <!-- Title / boot screen -->
    <div id="title-screen" class="title-screen">
      <div class="title-card">
        <div class="title-flake">❄</div>
        <h1 class="game-title">Frozen<span>Frontier</span></h1>
        <p class="title-tag">Melt the ice. Grow the camp. One more upgrade.</p>
        <button id="btn-play" class="btn btn-primary btn-big">▶&nbsp; Play</button>
        <button id="btn-new-game" class="btn btn-ghost hidden">Start a fresh world</button>
        <p class="title-hint">WASD / arrows to move · hold <b>Space</b> or <b>E</b> to harvest · tap works too</p>
      </div>
    </div>

    <!-- HUD -->
    <div id="hud" class="hud hidden">
      <div class="hud-top">
        <div class="hud-pill" id="coin-pill" title="Coins">
          <span class="pill-icon">🪙</span><span id="coin-count">0</span>
        </div>
        <div class="hud-pill" id="level-pill" title="Level">
          <span class="pill-icon">⭐</span><span id="level-num">1</span>
          <div class="xp-bar"><div id="xp-fill"></div></div>
        </div>
        <div class="hud-pill" id="bag-pill" title="Backpack">
          <span class="pill-icon">🎒</span><span id="bag-count">0/20</span>
        </div>
        <div class="hud-spacer"></div>
        <button class="hud-btn" id="btn-map" title="Map (M)">🗺️</button>
        <button class="hud-btn" id="btn-quests" title="Quests">📜</button>
        <button class="hud-btn" id="btn-bag" title="Backpack">🎒</button>
        <button class="hud-btn" id="btn-sound" title="Sound">🔊</button>
      </div>

      <div id="quest-tracker" class="quest-tracker">
        <div class="quest-title" id="quest-title">…</div>
        <div class="quest-progress"><div id="quest-fill"></div></div>
      </div>

      <div id="hint-bubble" class="hint-bubble hidden"></div>

      <canvas id="minimap" class="minimap hidden"></canvas>

      <!-- touch controls -->
      <div id="joystick" class="joystick hidden"><div class="joy-knob" id="joy-knob"></div></div>
      <button id="btn-action" class="action-btn hidden">✋</button>
    </div>

    <!-- Panels -->
    <div id="panel-backdrop" class="panel-backdrop hidden">
      <div id="panel" class="panel">
        <div class="panel-head">
          <h2 id="panel-title">Panel</h2>
          <button id="panel-close" class="btn-close">✕</button>
        </div>
        <div id="panel-body" class="panel-body"></div>
      </div>
    </div>

    <div id="toast-stack" class="toast-stack"></div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
